    tailwind.config = {

        extend: {
          colors: {

            canvas: '#F1F0ED',
            navy: { 50: '#eef2ff', 100: '#dde4ff', 200: '#c3cfff', 300: '#a0b0ff', 400: '#7b8aff', 500: '#1a1f3d', 600: '#14182f', 700: '#0f1225', 800: '#0a0d1a', 900: '#050710' },

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #e8e4de; margin: 0; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-gradient { background: linear-gradient(135deg, #1a1f3d 0%, #2d3561 50%, #1a1f3d 100%); }
    .blob-pattern { background-image: radial-gradient(circle at 20% 80%, rgba(59,130,246,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(59,130,246,0.1) 0%, transparent 50%); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, createContext, useContext, useCallback } = React;

    /* ── Lucide Icon ── */
    const I = ({ name, size = 20, className = '', fill = false }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        ref.current.innerHTML = '';
        const ic = lucide.icons[name];
        if (!ic) return;
        const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
        s.setAttribute('width', size); s.setAttribute('height', size);
        s.setAttribute('viewBox','0 0 24 24');
        s.setAttribute('fill', fill ? 'currentColor' : 'none');
        s.setAttribute('stroke','currentColor');
        s.setAttribute('stroke-width','2');
        s.setAttribute('stroke-linecap','round');
        s.setAttribute('stroke-linejoin','round');
        s.innerHTML = ic[0];
        ref.current.appendChild(s);
      }, [name, size, fill]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    /* ── Avatar ── */
    const Av = ({ src, name, size = 36 }) => (
      src
        ? <img src={src} className="rounded-full object-cover flex-shrink-0" style={{ width: size, height: size }} />
        : <div className="rounded-full flex-shrink-0 bg-navy-500 flex items-center justify-center text-white font-bold" style={{ width: size, height: size, fontSize: size * 0.38 }}>{(name||'V')[0]}</div>
    );

    /* ══════════════════════════════════ */
    /*        SHARED DATA & CONTEXT      */
    /* ══════════════════════════════════ */
    const AppCtx = createContext();
    const useApp = () => useContext(AppCtx);

    const users = [
      { name: 'Ana Beatriz', handle: '@anab_reads', avatar: null, bio: 'Devoradora de romances e defensora de finais felizes.', followers: 1243, following: 312, booksRead: 47, joined: 'Mar 2024' },
      { name: 'Carlos Mendes', handle: '@carlosm', avatar: null, bio: 'Leitor de ficção científica e fantasia. Se tem dragão, estou dentro.', followers: 876, following: 198, booksRead: 63, joined: 'Jan 2024' },
      { name: 'Julia Torres', handle: '@jutorres', avatar: null, bio: 'Professora de literatura e eterna apaixonada por clássicos.', followers: 2105, following: 445, booksRead: 112, joined: 'Nov 2023' },
      { name: 'Rafaela Lima', handle: '@rafa.lit', avatar: null, bio: 'Leitora compulsiva. 3 livros por semana é o mínimo.', followers: 3420, following: 521, booksRead: 89, joined: 'Fev 2024' },
      { name: 'Lucas Ferreira', handle: '@lucasf', avatar: null, bio: 'Fã de thriller e mistério. Sempre tentando adivinhar o final.', followers: 654, following: 230, booksRead: 38, joined: 'Mai 2024' },
      { name: 'Mariana Costa', handle: '@maricosta', avatar: null, bio: 'Poetisa e leitora de madrugada. Café e livros são minha vida.', followers: 1890, following: 340, booksRead: 72, joined: 'Dez 2023' },
    ];
    const books = [
      { id:1, title:'É Assim que Acaba', author:'Colleen Hoover', cover:'https://covers.openlibrary.org/b/isbn/9781501110368-L.jpg', rating:4.5, readers:'35.2K', chapters:12, genre:'Romance', description:'Uma história sobre o ciclo do amor e da perda, que vai te fazer questionar tudo.' },
      { id:2, title:'A Biblioteca da Meia-Noite', author:'Matt Haig', cover:'https://covers.openlibrary.org/b/isbn/9780525559474-L.jpg', rating:4.7, readers:'28.1K', chapters:15, genre:'Ficção', description:'Entre a vida e a morte, existe uma biblioteca com infinitas possibilidades.' },
      { id:3, title:'O Conto da Aia', author:'Margaret Atwood', cover:'https://covers.openlibrary.org/b/isbn/9780385490818-L.jpg', rating:4.6, readers:'19.8K', chapters:18, genre:'Distopia', description:'Um futuro sombrio onde as mulheres perderam todos os direitos.' },
      { id:4, title:'Torto Arado', author:'Itamar Vieira Junior', cover:'https://covers.openlibrary.org/b/isbn/9786580309318-L.jpg', rating:4.8, readers:'42.5K', chapters:10, genre:'Ficção', description:'Duas irmãs marcadas por um acidente e pelas injustiças do sertão baiano.' },
      { id:5, title:'A Garota no Trem', author:'Paula Hawkins', cover:'https://covers.openlibrary.org/b/isbn/9781594634024-L.jpg', rating:4.1, readers:'15.3K', chapters:14, genre:'Suspense', description:'Uma passageira de trem testemunha algo chocante que muda tudo.' },
      { id:6, title:'O Pequeno Príncipe', author:'Antoine de Saint-Exupéry', cover:'https://covers.openlibrary.org/b/isbn/9780156012195-L.jpg', rating:4.9, readers:'120K', chapters:8, genre:'Fantasia', description:'Uma fábula atemporal sobre o que realmente importa na vida.' },
      { id:7, title:'Dom Casmurro', author:'Machado de Assis', cover:'https://covers.openlibrary.org/b/isbn/9780195103090-L.jpg', rating:4.4, readers:'22.7K', chapters:20, genre:'Clássico', description:'Bentinho conta sua história e o leitor decide: Capitu traiu ou não?' },
      { id:8, title:'Verity', author:'Colleen Hoover', cover:'https://covers.openlibrary.org/b/isbn/9781538724736-L.jpg', rating:4.3, readers:'31.0K', chapters:16, genre:'Suspense', description:'Uma escritora descobre manuscritos perturbadores da esposa de seu novo interesse.' },
      { id:9, title:'1984', author:'George Orwell', cover:'https://covers.openlibrary.org/b/isbn/9780451524935-L.jpg', rating:4.7, readers:'55.4K', chapters:23, genre:'Distopia', description:'O Grande Irmão está te observando. A distopia definitiva.' },
      { id:10, title:'A Revolução dos Bichos', author:'George Orwell', cover:'https://covers.openlibrary.org/b/isbn/9780451526342-L.jpg', rating:4.5, readers:'38.9K', chapters:10, genre:'Ficção', description:'Uma fábula política brilhante sobre poder e corrupção.' },
      { id:11, title:'Orgulho e Preconceito', author:'Jane Austen', cover:'https://covers.openlibrary.org/b/isbn/9780141439518-L.jpg', rating:4.6, readers:'45.1K', chapters:24, genre:'Romance', description:'Elizabeth Bennet e Mr. Darcy numa das maiores histórias de amor da literatura.' },
      { id:12, title:'Cem Anos de Solidão', author:'Gabriel García Márquez', cover:'https://covers.openlibrary.org/b/isbn/9780060883287-L.jpg', rating:4.8, readers:'33.6K', chapters:20, genre:'Ficção', description:'A saga épica da família Buendía em Macondo, onde o mágico é real.' },
      { id:13, title:'O Morro dos Ventos Uivantes', author:'Emily Brontë', cover:'https://covers.openlibrary.org/b/isbn/9780141439556-L.jpg', rating:4.3, readers:'18.4K', chapters:17, genre:'Clássico', description:'Uma história de amor e vingança nos campos selvagens da Inglaterra.' },
      { id:14, title:'A Culpa é das Estrelas', author:'John Green', cover:'https://covers.openlibrary.org/b/isbn/9780525478812-L.jpg', rating:4.2, readers:'52.8K', chapters:13, genre:'Romance', description:'Dois adolescentes com câncer encontram o amor e o sentido da vida.' },
      { id:15, title:'O Alquimista', author:'Paulo Coelho', cover:'https://covers.openlibrary.org/b/isbn/9780061122415-L.jpg', rating:4.0, readers:'67.3K', chapters:11, genre:'Fantasia', description:'Uma jornada em busca de um tesouro que revela o verdadeiro sentido dos sonhos.' },
      { id:16, title:'Crime e Castigo', author:'Fiódor Dostoiévski', cover:'https://covers.openlibrary.org/b/isbn/9780486415871-L.jpg', rating:4.7, readers:'21.2K', chapters:30, genre:'Clássico', description:'Um estudante comete um crime e enfrenta o peso esmagador da culpa.' },
      { id:17, title:'Fahrenheit 451', author:'Ray Bradbury', cover:'https://covers.openlibrary.org/b/isbn/9781451673319-L.jpg', rating:4.5, readers:'29.7K', chapters:12, genre:'Distopia', description:'Num mundo onde livros são proibidos, um bombeiro começa a questionar tudo.' },
      { id:18, title:'O Hobbit', author:'J.R.R. Tolkien', cover:'https://covers.openlibrary.org/b/isbn/9780547928227-L.jpg', rating:4.8, readers:'61.5K', chapters:19, genre:'Fantasia', description:'Bilbo Baggins parte numa aventura inesperada com dragões e tesouros.' },
    ];
    const forumPosts = [
      { id:10, user: users[0], chapter:5, text:'A cena do jardim nesse capítulo é uma das mais bonitas que já li. A metáfora das flores como cicatrizes me quebrou.', spoiler:false, likes:45, replies:12, time:'1h' },
      { id:11, user: users[2], chapter:5, text:'Alguém mais notou a mudança no tom da narrativa aqui? Parece que a Lily finalmente está começando a questionar tudo.', spoiler:false, likes:32, replies:8, time:'3h' },
      { id:12, user: users[3], chapter:5, text:'Teoria: o diário dela vai revelar algo muito maior do que parece. A pista está na página 47.', spoiler:true, likes:78, replies:23, time:'5h' },
      { id:13, user: users[1], chapter:3, text:'O ritmo desse capítulo é perfeito. Cada parágrafo te puxa mais pra dentro da história.', spoiler:false, likes:56, replies:14, time:'2h' },
      { id:14, user: users[0], chapter:'geral', text:'Esse livro inteiro é uma montanha-russa emocional. Colleen Hoover realmente sabe como fazer a gente sentir tudo.', spoiler:false, likes:112, replies:38, time:'30min' },
      { id:15, user: users[3], chapter:'geral', text:'Comecei ontem e não consigo parar de ler. Alguém mais passou por isso?', spoiler:false, likes:95, replies:27, time:'1h' },
      { id:16, user: users[2], chapter:'geral', text:'A capa do livro é linda, mas não faz jus ao peso emocional da história. Recomendo muito.', spoiler:false, likes:64, replies:11, time:'4h' },
    ];
    const badges = [
      { icon: 'lightbulb', label: 'Teorista do Cap. 5', color: 'bg-amber-100 text-amber-700' },
      { icon: 'zap', label: 'Maratonista', color: 'bg-purple-100 text-purple-700' },
      { icon: 'flag', label: 'Primeiro a Chegar', color: 'bg-accent-100 text-accent-700' },
      { icon: 'flame', label: 'Debate Aceso', color: 'bg-red-100 text-red-600' },
    ];
    const currentUser = { name: 'Rayssa', handle: '@rayssa', avatar: null, bio: 'Apaixonada por livros.', followers: 500, following: 120, booksRead: 25, joined: 'Abr 2025' };
    const MAX = 40000;
    const genres = ['Todos', 'Romance', 'Ficção', 'Suspense', 'Distopia', 'Fantasia', 'Clássico'];

    /* ══════════════════════════════════ */
    /*   COMPONENTS (defined outside App)*/
    /* ══════════════════════════════════ */

    /* ═══════ POST CARD ═══════ */
    const PostCard = ({ p, showBookCtx = true }) => {
      const { go, goUser, updatePost } = useApp();
      const [liked, setLiked] = useState(false);
      const [following, setFollowing] = useState(true);
      const [showSpoiler, setShowSpoiler] = useState(false);
      const [editing, setEditing] = useState(false);
      const editRef = useRef(null);
      const isOwner = p.user.handle === currentUser.handle;
      const handleSave = () => {
        const val = editRef.current ? editRef.current.value.trim() : '';
        if (val && val !== p.text) updatePost(p.id, val);
        setEditing(false);
      };
      return (
        <div className="bg-white rounded-2xl p-4 mb-3 border border-stone-100 shadow-sm">
          <div className="flex gap-3">
            <Av name={p.user.name} size={36} />
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <button onClick={() => goUser(p.user)} className="font-semibold text-sm text-ink hover:text-accent-600 transition">{p.user.name}</button>
                <span className="text-ink-muted text-xs">{p.user.handle}</span>
                <button onClick={() => setFollowing(!following)}
                  className={`text-[10px] font-semibold px-2 py-0.5 rounded-full transition ${following ? 'bg-stone-100 text-ink-muted hover:bg-red-50 hover:text-red-500' : 'bg-accent-600 text-white hover:bg-accent-700'}`}>
                  {following ? 'Seguindo' : 'Seguir'}
                </button>
                <span className="text-ink-faint text-xs ml-auto">{p.time}</span>
              </div>
              {showBookCtx && p.book && p.book.cover && (
                <button onClick={() => go('forum', p.book)} className="mt-1 flex items-center gap-1.5 text-[11px] text-accent-600 font-medium hover:text-accent-700 transition">
                  <I name="book-open" size={12} />
                  {p.book.title} &middot; {typeof p.chapter === 'number' ? `Cap. ${p.chapter}` : 'Geral'}
                </button>
              )}
              {!showBookCtx && <p className="text-[11px] text-accent-600 font-medium mt-0.5">{typeof p.chapter === 'number' ? `Capítulo ${p.chapter}` : 'Geral'}</p>}
              {editing ? (
                <div className="mt-2">
                  <textarea ref={editRef} defaultValue={p.text}
                    className="w-full bg-white border border-accent-300 rounded-lg px-3 py-2 text-[13px] text-ink outline-none resize-none leading-relaxed focus:border-accent-500" rows="4" autoFocus />
                  <div className="flex items-center gap-2 mt-2">
                    <button onClick={handleSave} className="text-[11px] font-semibold px-3 py-1 bg-accent-600 text-white rounded-full hover:bg-accent-700 transition">Salvar</button>
                    <button onClick={() => setEditing(false)} className="text-[11px] font-semibold px-3 py-1 bg-stone-100 text-ink-muted rounded-full hover:bg-stone-200 transition">Cancelar</button>
                  </div>
                </div>
              ) : p.spoiler && !showSpoiler ? (
                <div className="mt-2 bg-stone-50 border border-stone-200 rounded-lg p-3 flex items-center justify-between">
                  <div className="flex items-center gap-2 text-xs text-ink-light"><I name="eye-off" size={14} className="text-spoiler" /><span>Contém spoiler</span></div>
                  <button onClick={() => setShowSpoiler(true)} className="text-xs text-accent-600 font-semibold hover:text-accent-700">Revelar</button>
                </div>
              ) : (
                <p className="mt-2 text-[13px] text-ink leading-relaxed">
                  {p.spoiler && <span className="inline-flex items-center gap-1 text-[10px] text-spoiler font-semibold uppercase tracking-wide mr-1.5"><I name="alert-triangle" size={10} className="text-spoiler" />Spoiler</span>}
                  {p.text}
                </p>
              )}
              <div className="flex items-center gap-5 mt-3">
                <button onClick={() => setLiked(!liked)} className={`flex items-center gap-1 text-xs transition ${liked ? 'text-rose-500' : 'text-ink-muted hover:text-rose-400'}`}>
                  <I name="heart" size={14} fill={liked} /> {p.likes + (liked ? 1 : 0)}
                </button>
                <button className="flex items-center gap-1 text-xs text-ink-muted hover:text-accent-600 transition"><I name="message-circle" size={14} /> {p.replies}</button>
                {isOwner && !editing && (
                  <button onClick={() => setEditing(true)} className="flex items-center gap-1 text-xs text-ink-muted hover:text-accent-600 transition"><I name="pencil" size={14} /></button>
                )}
                <button className="flex items-center gap-1 text-xs text-ink-muted hover:text-accent-600 transition ml-auto"><I name="bookmark" size={14} /></button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════ SCREEN: HOME ═══════ */
    const Home = () => {
      const { tab, setTab, feedPosts, go } = useApp();
      const [heroIdx, setHeroIdx] = useState(0);
      const heroBooks = [books[0], books[3], books[11], books[17]];
      useEffect(() => { const t = setInterval(() => setHeroIdx(i => (i+1) % heroBooks.length), 5000); return () => clearInterval(t); }, []);
      const hb = heroBooks[heroIdx];
      return (
        <div className="pb-20 relative">
          {/* Hero Carousel */}
          <div className="hero-gradient blob-pattern relative overflow-hidden px-5 pt-6 pb-8">
            <div className="flex items-center gap-4">
              <div className="flex-1 min-w-0">
                <p className="text-accent-300 text-[10px] font-semibold uppercase tracking-widest mb-1">{hb.genre}</p>
                <h2 className="font-display text-white text-xl font-bold leading-tight">{hb.title}</h2>
                <p className="text-stone-300 text-xs mt-1">{hb.author}</p>
                <p className="text-stone-400 text-[11px] mt-2 line-clamp-2">{hb.description}</p>
                <button onClick={() => go('forum', hb)} className="mt-3 px-4 py-2 bg-white text-navy-500 text-xs font-semibold rounded-lg hover:bg-stone-100 transition">
                  Ver mais
                </button>
              </div>
              <img src={hb.cover} className="w-24 h-36 rounded-xl object-cover shadow-xl flex-shrink-0 border-2 border-white/20" />
            </div>
            <div className="flex justify-center gap-1.5 mt-4">
              {heroBooks.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full transition ${i === heroIdx ? 'bg-white' : 'bg-white/30'}`} />)}
            </div>
          </div>

          {/* Feed Tabs */}
          <div className="flex border-b border-stone-200 bg-white">
            {['seguindo','explorar'].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`flex-1 py-3 text-sm font-semibold capitalize transition ${tab === t ? 'text-accent-600 border-b-2 border-accent-600' : 'text-ink-muted'}`}>{t}</button>
            ))}
          </div>
          <div className="p-4">{feedPosts.map(p => <PostCard key={p.id} p={p} />)}</div>
        </div>
      );
    };

    /* ═══════ SCREEN: BUSCA ═══════ */
    const Busca = () => {
      const { go } = useApp();
      const [q, setQ] = useState('');
      const [genre, setGenre] = useState('Todos');
      const inputRef = useRef(null);
      useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
      const filtered = books.filter(b => {
        const matchQ = q.length === 0 || b.title.toLowerCase().includes(q.toLowerCase()) || b.author.toLowerCase().includes(q.toLowerCase());
        const matchG = genre === 'Todos' || b.genre === genre;
        return matchQ && matchG;
      });
      return (
        <div className="pb-20">
          <div className="p-4">
            {/* Search bar */}
            <div className="flex items-center gap-2 bg-white rounded-xl px-4 py-3 border border-stone-200 mb-4 shadow-sm">
              <I name="search" size={16} className="text-ink-muted" />
              <input ref={inputRef} defaultValue="" onInput={e => setQ(e.target.value)}
                placeholder="Título, autor ou gênero..." className="flex-1 bg-transparent outline-none text-sm text-ink placeholder-ink-faint" />
              {q && <button onClick={() => { if(inputRef.current) inputRef.current.value = ''; setQ(''); }} className="text-ink-faint hover:text-ink-muted text-lg leading-none">&times;</button>}
            </div>

            {/* Genre filter tabs (from template) */}
            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4">
              {genres.map(g => (
                <button key={g} onClick={() => setGenre(g)}
                  className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition ${genre === g ? 'bg-navy-500 text-white' : 'bg-white text-ink-light border border-stone-200 hover:border-accent-300'}`}>
                  {g}
                </button>
              ))}
            </div>

            <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-3">{q || genre !== 'Todos' ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}` : 'Catálogo'}</p>

            {filtered.length === 0 && (
              <div className="text-center py-12">
                <I name="search" size={32} className="mx-auto mb-3 text-ink-faint" />
                <p className="text-sm text-ink-muted">Nenhum livro encontrado</p>
                <p className="text-xs text-ink-faint mt-1">Tente outro título, autor ou gênero</p>
              </div>
            )}

            {/* Book grid (inspired by template) */}
            <div className="grid grid-cols-2 gap-3">
              {filtered.map(b => (
                <div key={b.id} onClick={() => go('forum', b)} className="bg-white rounded-xl overflow-hidden border border-stone-100 shadow-sm cursor-pointer hover:shadow-md transition group">
                  <div className="relative">
                    <img src={b.cover} alt={b.title} className="w-full aspect-[2/3] object-cover" />
                    <div className="absolute top-2 right-2 bg-black/60 text-white text-[9px] font-semibold px-1.5 py-0.5 rounded-md flex items-center gap-0.5">
                      <span className="text-amber-400">★</span> {b.rating}
                    </div>
                  </div>
                  <div className="p-3">
                    <p className="font-semibold text-xs text-ink line-clamp-2 group-hover:text-accent-600 transition">{b.title}</p>

      const [viewUser, setViewUser] = useState(null);
      const [feedPosts, setFeedPosts] = useState([
        { id:1, user: users[0], book: books[0], chapter:8, text:'Gente, o capítulo 8 me destruiu completamente. Nunca esperei que o Ryle fosse capaz de algo assim. Estou em choque.', spoiler:true, likes:124, replies:45, time:'2h' },
        { id:2, user: users[1], book: books[1], chapter:12, text:'O plot twist do capítulo 12 é absurdo. Quem mais percebeu as pistas escondidas desde o capítulo 3?', spoiler:false, likes:89, replies:32, time:'4h' },
        { id:3, user: users[2], book: books[0], chapter:5, text:'Acabei de chegar no capítulo 5 e já estou apaixonada pela escrita. A forma como ela descreve as memórias é poesia pura.', spoiler:false, likes:67, replies:18, time:'5h' },
        { id:4, user: users[3], book: books[0], chapter:3, text:'Só eu que já chorei 3 vezes e estou só no capítulo 3? Esse livro vai acabar comigo.', spoiler:false, likes:203, replies:61, time:'6h' },
        { id:5, user: users[4], book: books[4], chapter:7, text:'Esse livro me fez desconfiar de todo mundo no trem da minha cidade. Paula Hawkins é genial.', spoiler:false, likes:45, replies:9, time:'7h' },
        { id:6, user: users[5], book: books[11], chapter:3, text:'Macondo é um lugar que eu gostaria de visitar. García Márquez criou um universo inteiro com palavras.', spoiler:false, likes:156, replies:42, time:'8h' },
      ]);

      const go = useCallback((s, b) => { setScreenHistory(h => [...h, screen]); if(b) setPostBook(b); setScreen(s); }, [screen]);
      const goUser = useCallback((u) => { setScreenHistory(h => [...h, screen]); setViewUser(u); setScreen('userprofile'); }, [screen]);
      const goBack = useCallback(() => { setScreenHistory(h => { const copy = [...h]; const prev = copy.pop() || 'home'; setScreen(prev); return copy; }); }, []);

      const publishPost = useCallback((taRef) => {
        const txt = taRef && taRef.current ? taRef.current.value : '';
        if (!txt.trim()) return;
        const b = postBook;
        const ch = b ? (postChapter === 'geral' ? 'geral' : parseInt(postChapter)) : 'geral';
        const newPost = { id: Date.now(), user: currentUser, book: b || { title: 'Geral', cover: '' }, chapter: ch, text: txt, spoiler, likes: 0, replies: 0, time: 'agora' };
        setFeedPosts(prev => [newPost, ...prev]);
        if (taRef && taRef.current) taRef.current.value = '';
        setSpoiler(false); setPostChapter('geral'); setPostBook(null);
        setScreenHistory([]); setScreen('home');
      }, [postBook, postChapter, spoiler]);

      const updatePost = useCallback((id, newText) => {
        setFeedPosts(prev => prev.map(p => p.id === id ? { ...p, text: newText } : p));
      }, []);

      const ctx = { screen, tab, setTab, chapter, setChapter, userChapter, spoiler, setSpoiler, postBook, setPostBook, postChapter, setPostChapter, viewUser, feedPosts, go, goUser, goBack, publishPost, updatePost };

      const mainScreens = ['home','busca','estante','perfil'];
      return (
        <AppCtx.Provider value={ctx}>
          <div className="max-w-md mx-auto bg-canvas min-h-screen shadow-2xl relative">
            {/* Header — dark navy inspired by template */}
            {mainScreens.includes(screen) && (
              <div className="sticky top-0 bg-navy-500 px-4 py-3 flex items-center gap-3 z-50">
                {screen !== 'home' && <button onClick={goBack} className="text-white/70 p-1 -ml-1 hover:text-white transition"><I name="arrow-left" size={22} /></button>}
                <div className="flex items-center gap-2 flex-1">
                  <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center">
                    <I name="book-open" size={16} className="text-navy-500" />
                  </div>
                  <h1 className="text-lg font-display italic text-white font-bold">Verso</h1>
                </div>
                <div className="flex items-center gap-3">
                  <button className="text-white/70 hover:text-white transition"><I name="bell" size={18} /></button>
                  <Av name="R" size={28} />
                </div>
              </div>
            )}
            {screen === 'home' && <Home />}
            {screen === 'busca' && <Busca />}
            {screen === 'forum' && <Forum />}
            {screen === 'post' && <NovoVerso />}
            {screen === 'estante' && <Estante />}
            {screen === 'perfil' && <Perfil />}
            {screen === 'userprofile' && <UserProfile />}
            {screen === 'home' && (
              <div className="sticky bottom-20 z-50 flex justify-end px-4 pointer-events-none" style={{ marginTop: '-70px' }}>
                <button onClick={() => { setPostBook(null); go('post'); }}
                  className="w-14 h-14 bg-accent-600 text-white rounded-full shadow-lg hover:bg-accent-700 transition flex items-center justify-center pointer-events-auto">
                  <I name="plus" size={24} />
                </button>
              </div>
            )}
            <Nav />
          </div>
        </AppCtx.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
