    .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

    /* ── Animations ── */
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    @keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .anim-fade{animation:fadeIn .35s ease-out both}
    .anim-slide-up{animation:slideUp .4s ease-out both}
    .anim-slide-right{animation:slideRight .35s ease-out both}
    .anim-scale{animation:scaleIn .3s ease-out both}
    .anim-pop{animation:popIn .35s ease-out both}
    .anim-d1{animation-delay:.05s}.anim-d2{animation-delay:.1s}.anim-d3{animation-delay:.15s}.anim-d4{animation-delay:.2s}.anim-d5{animation-delay:.25s}
    .skeleton{background:linear-gradient(90deg,#e5e5e5 25%,#f0f0f0 50%,#e5e5e5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    .hover-lift{transition:transform .2s,box-shadow .2s}
    .hover-lift:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
    .press{transition:transform .1s}.press:active{transform:scale(.97)}

    /* ── Responsive: Desktop sidebar ── */
    @media(min-width:768px){
      .app-shell{display:flex;max-width:1024px;margin:0 auto}
      .desktop-sidebar{display:flex;flex-direction:column;width:220px;min-height:100vh;background:#fff;border-right:1px solid #e5e5e5;position:sticky;top:0;padding:1.5rem 1rem;flex-shrink:0}

      .main-content{flex:1;min-width:0}
      .mobile-nav{display:none!important}
      .mobile-header{display:none!important}
    }
    @media(max-width:767px){
      .desktop-sidebar{display:none!important}
    }

    /* ── Lucide Icon ── */
    const I = ({name,size=20,className='',fill=false}) => {
      const ref=useRef(null);
      useEffect(()=>{
        if(!ref.current)return;
        ref.current.innerHTML='';
        const ic=lucide.icons[name];if(!ic)return;
        const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
        s.setAttribute('width',size);s.setAttribute('height',size);
        s.setAttribute('viewBox','0 0 24 24');
        s.setAttribute('fill',fill?'currentColor':'none');
        s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
        s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
        s.innerHTML=ic[0];ref.current.appendChild(s);
      },[name,size,fill]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}/>;
    };

    /* ── Avatar ── */
    const Av = ({src,name,size=36}) => (
      src
        ? <img src={src} className="rounded-full object-cover flex-shrink-0" style={{width:size,height:size}}/>
        : <div className="rounded-full flex-shrink-0 bg-navy-500 flex items-center justify-center text-white font-bold" style={{width:size,height:size,fontSize:size*.38}}>{(name||'V')[0]}</div>
    );

    /* ── Image with skeleton loader ── */
    const Img = ({src,alt='',className=''}) => {
      const [loaded,setLoaded]=useState(false);
      return (
        <div className={`relative overflow-hidden ${className}`}>
          {!loaded && <div className="absolute inset-0 skeleton rounded-inherit"/>}
          <img src={src} alt={alt} className={`w-full h-full object-cover transition-opacity duration-300 ${loaded?'opacity-100':'opacity-0'}`} onLoad={()=>setLoaded(true)}/>
        </div>
      );
    };

    const PostCard = ({p,showBookCtx=true,delay=0}) => {

      return (
        <nav className="mobile-nav fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-white border-t border-stone-200 flex justify-around py-2 z-50">
          {[{id:'home',icon:'home',label:'Home'},{id:'busca',icon:'search',label:'Busca'},{id:'estante',icon:'book-open',label:'Estante'},{id:'perfil',icon:'user',label:'Perfil'}].map(t=>(
            <button key={t.id} onClick={()=>go(t.id)} className={`flex flex-col items-center gap-0.5 px-3 transition press ${screen===t.id?'text-accent-600':'text-ink-faint hover:text-ink-muted'}`}>
              <I name={t.icon} size={20}/><span className="text-[9px] font-medium">{t.label}</span>
            </button>
          ))}
        </nav>
      );
    };

    /* ═══════ DESKTOP SIDEBAR ═══════ */
    const Sidebar = () => {
      const {screen,go}=useApp();
      const navItems=[{id:'home',icon:'home',label:'Home'},{id:'busca',icon:'search',label:'Busca'},{id:'estante',icon:'book-open',label:'Estante'},{id:'messages',icon:'mail',label:'Mensagens'},{id:'notifications',icon:'bell',label:'Notificações'},{id:'perfil',icon:'user',label:'Perfil'},{id:'settings',icon:'settings',label:'Configurações'}];
      return (
        <aside className="desktop-sidebar">
          <div className="flex items-center gap-2 mb-8 px-2">
            <div className="w-10 h-10 rounded-full bg-navy-500 flex items-center justify-center"><I name="book-open" size={18} className="text-white"/></div>
            <h1 className="text-xl font-display italic text-navy-500 font-bold">Verso</h1>
          </div>
          {navItems.map(t=>(
            <div key={t.id} onClick={()=>go(t.id)} className={`nav-item ${screen===t.id?'active':''}`}>
              <I name={t.icon} size={18}/>{t.label}
            </div>
          ))}
          <div className="mt-auto pt-6 px-2">
            <div className="flex items-center gap-3 px-2">
              <Av name="Rayssa" size={34}/>
              <div><p className="text-sm font-semibold text-ink">Rayssa</p><p className="text-[10px] text-ink-muted">@rayssa</p></div>
            </div>
          </div>
        </aside>
      );
    };

    /* ══════════════════════════════════ */
    /*              APP                  */
    /* ══════════════════════════════════ */
    const App = () => {
      const [screen,setScreen]=useState('home');
      const [screenHistory,setScreenHistory]=useState([]);
      const [tab,setTab]=useState('seguindo');
      const [chapter,setChapter]=useState('todos');
      const [userChapter]=useState(5);
      const [spoiler,setSpoiler]=useState(false);
      const [postBook,setPostBook]=useState(null);
      const [postChapter,setPostChapter]=useState('geral');
      const [viewUser,setViewUser]=useState(null);
      const [feedPosts,setFeedPosts]=useState([
        {id:1,user:users[0],book:books[0],chapter:8,text:'Gente, o capítulo 8 me destruiu completamente. Nunca esperei que o Ryle fosse capaz de algo assim. Estou em choque.',spoiler:true,likes:124,replies:45,time:'2h'},
        {id:2,user:users[1],book:books[1],chapter:12,text:'O plot twist do capítulo 12 é absurdo. Quem mais percebeu as pistas escondidas desde o capítulo 3?',spoiler:false,likes:89,replies:32,time:'4h'},
        {id:3,user:users[2],book:books[0],chapter:5,text:'Acabei de chegar no capítulo 5 e já estou apaixonada pela escrita. A forma como ela descreve as memórias é poesia pura.',spoiler:false,likes:67,replies:18,time:'5h'},
        {id:4,user:users[3],book:books[0],chapter:3,text:'Só eu que já chorei 3 vezes e estou só no capítulo 3? Esse livro vai acabar comigo.',spoiler:false,likes:203,replies:61,time:'6h'},
        {id:5,user:users[4],book:books[4],chapter:7,text:'Esse livro me fez desconfiar de todo mundo no trem da minha cidade. Paula Hawkins é genial.',spoiler:false,likes:45,replies:9,time:'7h'},
        {id:6,user:users[5],book:books[11],chapter:3,text:'Macondo é um lugar que eu gostaria de visitar. García Márquez criou um universo inteiro com palavras.',spoiler:false,likes:156,replies:42,time:'8h'},
      ]);

      const go=useCallback((s,b)=>{setScreenHistory(h=>[...h,screen]);if(b)setPostBook(b);setScreen(s)},[screen]);
      const goUser=useCallback((u)=>{setScreenHistory(h=>[...h,screen]);setViewUser(u);setScreen('userprofile')},[screen]);
      const goBack=useCallback(()=>{setScreenHistory(h=>{const c=[...h];const prev=c.pop()||'home';setScreen(prev);return c})},[]);

      const publishPost=useCallback((taRef)=>{
        const txt=taRef&&taRef.current?taRef.current.value:'';
        if(!txt.trim())return;
        const b=postBook;
        const ch=b?(postChapter==='geral'?'geral':parseInt(postChapter)):'geral';
        const newPost={id:Date.now(),user:currentUser,book:b||{title:'Geral',cover:''},chapter:ch,text:txt,spoiler,likes:0,replies:0,time:'agora'};
        setFeedPosts(prev=>[newPost,...prev]);
        if(taRef&&taRef.current)taRef.current.value='';
        setSpoiler(false);setPostChapter('geral');setPostBook(null);
        setScreenHistory([]);setScreen('home');
      },[postBook,postChapter,spoiler]);

      const updatePost=useCallback((id,newText)=>{setFeedPosts(prev=>prev.map(p=>p.id===id?{...p,text:newText}:p))},[]);

      const ctx={screen,tab,setTab,chapter,setChapter,userChapter,spoiler,setSpoiler,postBook,setPostBook,postChapter,setPostChapter,viewUser,feedPosts,go,goUser,goBack,publishPost,updatePost};

      const mainScreens=['home','busca','estante','perfil'];
      const unreadCount=sampleNotifications.filter(n=>!n.read).length;
      const dmUnread=sampleConversations.reduce((a,c)=>a+c.unread,0);
      return (
        <AppCtx.Provider value={ctx}>
          <div className="app-shell">
            <Sidebar/>
            <div className="main-content max-w-md md:max-w-none mx-auto bg-canvas min-h-screen shadow-2xl md:shadow-none relative">
              {/* Mobile header */}
              {mainScreens.includes(screen)&&(
                <div className="mobile-header sticky top-0 bg-navy-500 px-4 py-3 flex items-center gap-3 z-50">
                  {screen!=='home'&&<button onClick={goBack} className="text-white/70 p-1 -ml-1 hover:text-white transition press"><I name="arrow-left" size={22}/></button>}
                  <div className="flex items-center gap-2 flex-1">
                    <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center"><I name="book-open" size={16} className="text-navy-500"/></div>
                    <h1 className="text-lg font-display italic text-white font-bold">Verso</h1>
                  </div>
                  <div className="flex items-center gap-3">
                    <button onClick={()=>go('messages')} className="text-white/70 hover:text-white transition press relative">
                      <I name="mail" size={18}/>
                      {dmUnread>0&&<span className="absolute -top-1 -right-1 w-4 h-4 bg-accent-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center">{dmUnread}</span>}
                    </button>
                    <button onClick={()=>go('notifications')} className="text-white/70 hover:text-white transition press relative">
                      <I name="bell" size={18}/>
                      {unreadCount>0&&<span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center">{unreadCount}</span>}
                    </button>
                    <Av name="R" size={28}/>
                  </div>
                </div>
              )}
              {screen==='home'&&<Home/>}
              {screen==='busca'&&<Busca/>}
              {screen==='bookdetail'&&<BookDetail/>}
              {screen==='forum'&&<Forum/>}
              {screen==='post'&&<NovoVerso/>}
              {screen==='estante'&&<Estante/>}
              {screen==='perfil'&&<Perfil/>}
              {screen==='userprofile'&&<UserProfile/>}
              {screen==='notifications'&&<Notifications/>}
              {screen==='messages'&&<Messages/>}
              {screen==='chat'&&<Chat/>}
              {screen==='settings'&&<Settings/>}
              {screen==='home'&&(
                <div className="sticky bottom-20 md:bottom-4 z-50 flex justify-end px-4 pointer-events-none" style={{marginTop:'-70px'}}>
                  <button onClick={()=>{setPostBook(null);go('post')}} className="group relative w-14 h-14 rounded-full flex items-center justify-center pointer-events-auto transition-all duration-300 hover:scale-110 active:scale-95" style={{background:'linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%)',boxShadow:'0 4px 15px rgba(37,99,235,.4)'}}>
                    <span className="absolute inset-0 rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-300" style={{boxShadow:'0 8px 30px rgba(37,99,235,.5)'}}/>
                    <span className="absolute inset-0 rounded-full animate-ping opacity-20 bg-accent-400" style={{animationDuration:'2.5s'}}/>
                    <I name="plus" size={24} className="text-white relative z-10 transition-transform duration-300 group-hover:rotate-90"/>
                  </button>
                </div>
              )}
              <Nav/>
            </div>
          </div>
        </AppCtx.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
