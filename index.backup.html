<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#FAF8F5',
            canvas: '#F3F0EB',
            sage: { 50: '#f4f7f4', 100: '#e2ebe2', 200: '#c5d6c5', 300: '#9cb89c', 400: '#739573', 500: '#587a58', 600: '#436243', 700: '#364f36', 800: '#2d402d', 900: '#263426' },
            ink: { DEFAULT: '#1a1a1a', light: '#6b6b6b', muted: '#9a9a9a', faint: '#c8c8c8' },
            warm: { 100: '#fff8f0', 200: '#ffeedd', 300: '#ffdbb8' },
            spoiler: '#e74c3c',
          },
          fontFamily: {
            display: ['"DM Serif Display"', 'Georgia', 'serif'],
            body: ['"DM Sans"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #e8e4de; margin: 0; }
    .font-display { font-family: 'DM Serif Display', Georgia, serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── Lucide Icon ── */
    const I = ({ name, size = 20, className = '', fill = false }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        ref.current.innerHTML = '';
        const ic = lucide.icons[name];
        if (!ic) return;
        const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
        s.setAttribute('width', size); s.setAttribute('height', size);
        s.setAttribute('viewBox','0 0 24 24');
        s.setAttribute('fill', fill ? 'currentColor' : 'none');
        s.setAttribute('stroke','currentColor');
        s.setAttribute('stroke-width','2');
        s.setAttribute('stroke-linecap','round');
        s.setAttribute('stroke-linejoin','round');
        s.innerHTML = ic[0];
        ref.current.appendChild(s);
      }, [name, size, fill]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    /* ── Avatar ── */
    const Av = ({ src, name, size = 36 }) => (
      src
        ? <img src={src} className="rounded-full object-cover flex-shrink-0" style={{ width: size, height: size }} />
        : <div className="rounded-full flex-shrink-0 bg-sage-200 flex items-center justify-center text-sage-700 font-bold" style={{ width: size, height: size, fontSize: size * 0.38 }}>{(name||'V')[0]}</div>
    );

    /* ══════════════════════════════════ */
    /*            VERSO APP              */
    /* ══════════════════════════════════ */
    const App = () => {
      const [screen, setScreen] = useState('home');
      const [screenHistory, setScreenHistory] = useState([]);
      const [tab, setTab] = useState('seguindo');
      const [chapter, setChapter] = useState('todos');
      const [userChapter, setUserChapter] = useState(5);
      const [postTextLen, setPostTextLen] = useState(0);
      const [spoiler, setSpoiler] = useState(false);
      const [postBook, setPostBook] = useState(null);
      const [viewUser, setViewUser] = useState(null);
      const MAX = 40000;

      /* ── Data ── */
      const users = [
        { name: 'Ana Beatriz', handle: '@anab_reads', avatar: null, bio: 'Devoradora de romances e defensora de finais felizes.', followers: 1243, following: 312, booksRead: 47, joined: 'Mar 2024' },
        { name: 'Carlos Mendes', handle: '@carlosm', avatar: null, bio: 'Leitor de ficção científica e fantasia. Se tem dragão, estou dentro.', followers: 876, following: 198, booksRead: 63, joined: 'Jan 2024' },
        { name: 'Julia Torres', handle: '@jutorres', avatar: null, bio: 'Professora de literatura e eterna apaixonada por clássicos.', followers: 2105, following: 445, booksRead: 112, joined: 'Nov 2023' },
        { name: 'Rafaela Lima', handle: '@rafa.lit', avatar: null, bio: 'Leitora compulsiva. 3 livros por semana é o mínimo.', followers: 3420, following: 521, booksRead: 89, joined: 'Fev 2024' },
      ];

      const books = [
        { id:1, title:'É Assim que Acaba', author:'Colleen Hoover', cover:'https://covers.openlibrary.org/b/isbn/9781501110368-L.jpg', rating:4.5, readers:'35.2K', chapters:12, genre:'Romance' },
        { id:2, title:'A Biblioteca da Meia-Noite', author:'Matt Haig', cover:'https://covers.openlibrary.org/b/isbn/9780525559474-L.jpg', rating:4.7, readers:'28.1K', chapters:15, genre:'Ficção' },
        { id:3, title:'O Conto da Aia', author:'Margaret Atwood', cover:'https://covers.openlibrary.org/b/isbn/9780385490818-L.jpg', rating:4.6, readers:'19.8K', chapters:18, genre:'Distopia' },
        { id:4, title:'Torto Arado', author:'Itamar Vieira Junior', cover:'https://covers.openlibrary.org/b/isbn/9786580309318-L.jpg', rating:4.8, readers:'42.5K', chapters:10, genre:'Ficção' },
        { id:5, title:'A Garota no Trem', author:'Paula Hawkins', cover:'https://covers.openlibrary.org/b/isbn/9781594634024-L.jpg', rating:4.1, readers:'15.3K', chapters:14, genre:'Suspense' },
        { id:6, title:'O Pequeno Príncipe', author:'Antoine de Saint-Exupéry', cover:'https://covers.openlibrary.org/b/isbn/9780156012195-L.jpg', rating:4.9, readers:'120K', chapters:8, genre:'Fantasia' },
        { id:7, title:'Dom Casmurro', author:'Machado de Assis', cover:'https://covers.openlibrary.org/b/isbn/9780195103090-L.jpg', rating:4.4, readers:'22.7K', chapters:20, genre:'Clássico' },
        { id:8, title:'Verity', author:'Colleen Hoover', cover:'https://covers.openlibrary.org/b/isbn/9781538724736-L.jpg', rating:4.3, readers:'31.0K', chapters:16, genre:'Suspense' },
        { id:9, title:'1984', author:'George Orwell', cover:'https://covers.openlibrary.org/b/isbn/9780451524935-L.jpg', rating:4.7, readers:'55.4K', chapters:23, genre:'Distopia' },
        { id:10, title:'A Revolução dos Bichos', author:'George Orwell', cover:'https://covers.openlibrary.org/b/isbn/9780451526342-L.jpg', rating:4.5, readers:'38.9K', chapters:10, genre:'Ficção' },
      ];

      const [feedPosts, setFeedPosts] = useState([
        { id:1, user: users[0], book: books[0], chapter:8, text:'Gente, o capítulo 8 me destruiu completamente. Nunca esperei que o Ryle fosse capaz de algo assim. Estou em choque.', spoiler:true, likes:124, replies:45, time:'2h' },
        { id:2, user: users[1], book: books[1], chapter:12, text:'O plot twist do capítulo 12 é absurdo. Quem mais percebeu as pistas escondidas desde o capítulo 3?', spoiler:false, likes:89, replies:32, time:'4h' },
        { id:3, user: users[2], book: books[0], chapter:5, text:'Acabei de chegar no capítulo 5 e já estou apaixonada pela escrita. A forma como ela descreve as memórias é poesia pura.', spoiler:false, likes:67, replies:18, time:'5h' },
        { id:4, user: users[3], book: books[0], chapter:3, text:'Só eu que já chorei 3 vezes e estou só no capítulo 3? Esse livro vai acabar comigo.', spoiler:false, likes:203, replies:61, time:'6h' },
      ]);
      const [postChapter, setPostChapter] = useState('geral');
      const currentUser = { name: 'Rayssa', handle: '@rayssa', avatar: null, bio: 'Apaixonada por livros.', followers: 500, following: 120, booksRead: 25, joined: 'Abr 2025' };
      const publishPost = () => {
        const txt = postRef.current ? postRef.current.value : '';
        if (!txt.trim()) return;
        const b = postBook;
        const ch = b ? (postChapter === 'geral' ? 'geral' : parseInt(postChapter)) : 'geral';
        const newPost = { id: Date.now(), user: currentUser, book: b || { title: 'Geral', cover: '' }, chapter: ch, text: txt, spoiler, likes: 0, replies: 0, time: 'agora' };
        setFeedPosts(prev => [newPost, ...prev]);
        if (postRef.current) postRef.current.value = '';
        setPostTextLen(0); setSpoiler(false); setPostChapter('geral'); setPostBook(null);
        setScreenHistory([]); setScreen('home');
      };

      const forumPosts = [
        { id:10, user: users[0], chapter:5, text:'A cena do jardim nesse capítulo é uma das mais bonitas que já li. A metáfora das flores como cicatrizes me quebrou.', spoiler:false, likes:45, replies:12, time:'1h' },
        { id:11, user: users[2], chapter:5, text:'Alguém mais notou a mudança no tom da narrativa aqui? Parece que a Lily finalmente está começando a questionar tudo.', spoiler:false, likes:32, replies:8, time:'3h' },
        { id:12, user: users[3], chapter:5, text:'Teoria: o diário dela vai revelar algo muito maior do que parece. A pista está na página 47.', spoiler:true, likes:78, replies:23, time:'5h' },
        { id:13, user: users[1], chapter:3, text:'O ritmo desse capítulo é perfeito. Cada parágrafo te puxa mais pra dentro da história.', spoiler:false, likes:56, replies:14, time:'2h' },
        { id:14, user: users[0], chapter:'geral', text:'Esse livro inteiro é uma montanha-russa emocional. Colleen Hoover realmente sabe como fazer a gente sentir tudo.', spoiler:false, likes:112, replies:38, time:'30min' },
        { id:15, user: users[3], chapter:'geral', text:'Comecei ontem e não consigo parar de ler. Alguém mais passou por isso?', spoiler:false, likes:95, replies:27, time:'1h' },
        { id:16, user: users[2], chapter:'geral', text:'A capa do livro é linda, mas não faz jus ao peso emocional da história. Recomendo muito.', spoiler:false, likes:64, replies:11, time:'4h' },
      ];

      const badges = [
        { icon: 'lightbulb', label: 'Teorista do Cap. 5', color: 'bg-amber-100 text-amber-700' },
        { icon: 'zap', label: 'Maratonista', color: 'bg-purple-100 text-purple-700' },
        { icon: 'flag', label: 'Primeiro a Chegar', color: 'bg-sage-100 text-sage-700' },
        { icon: 'flame', label: 'Debate Aceso', color: 'bg-red-100 text-red-600' },
      ];

      const heatmapData = Array.from({length:52*7}, () => Math.random());

      const [searchFilter, setSearchFilter] = useState('');
      const searchRef = useRef(null);
      const postRef = useRef(null);
      useEffect(() => { if (screen === 'busca' && searchRef.current) searchRef.current.focus(); }, [screen]);
      useEffect(() => { if (screen === 'post' && postRef.current) postRef.current.focus(); }, [screen]);
      const go = (s, b) => { setScreenHistory(h => [...h, screen]); if(b) setPostBook(b); setScreen(s); };
      const goUser = (u) => { setScreenHistory(h => [...h, screen]); setViewUser(u); setScreen('userprofile'); };
      const goBack = () => { const h = [...screenHistory]; const prev = h.pop() || 'home'; setScreenHistory(h); setScreen(prev); };

      /* ═══════ POST CARD (reusable) ═══════ */
      const PostCard = ({ p, showBookCtx = true }) => {
        const [liked, setLiked] = useState(false);
        const [following, setFollowing] = useState(true);
        const [showSpoiler, setShowSpoiler] = useState(false);
        return (
          <div className="bg-white rounded-xl p-4 mb-3">
            <div className="flex gap-3">
              <Av name={p.user.name} size={36} />
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <button onClick={() => goUser(p.user)} className="font-semibold text-sm text-ink hover:text-sage-700 transition">{p.user.name}</button>
                  <span className="text-ink-muted text-xs">{p.user.handle}</span>
                  <button onClick={() => setFollowing(!following)}
                    className={`text-[10px] font-semibold px-2 py-0.5 rounded-full transition ${following ? 'bg-stone-100 text-ink-muted hover:bg-red-50 hover:text-red-500' : 'bg-sage-600 text-white hover:bg-sage-700'}`}>
                    {following ? 'Seguindo' : 'Seguir'}
                  </button>
                  <span className="text-ink-faint text-xs ml-auto">{p.time}</span>
                </div>
                {showBookCtx && p.book && p.book.cover && (
                  <button onClick={() => go('forum', p.book)} className="mt-1 flex items-center gap-1.5 text-[11px] text-sage-600 font-medium hover:text-sage-800 transition">
                    <I name="book-open" size={12} />
                    {p.book.title} &middot; {typeof p.chapter === 'number' ? `Cap. ${p.chapter}` : 'Geral'}
                  </button>
                )}
                {!showBookCtx && <p className="text-[11px] text-sage-600 font-medium mt-0.5">{typeof p.chapter === 'number' ? `Capítulo ${p.chapter}` : 'Geral'}</p>}

                {/* Spoiler handling */}
                {p.spoiler && !showSpoiler ? (
                  <div className="mt-2 bg-stone-50 border border-stone-200 rounded-lg p-3 flex items-center justify-between">
                    <div className="flex items-center gap-2 text-xs text-ink-light">
                      <I name="eye-off" size={14} className="text-spoiler" />
                      <span>Contém spoiler</span>
                    </div>
                    <button onClick={() => setShowSpoiler(true)} className="text-xs text-sage-600 font-semibold hover:text-sage-800">Revelar</button>
                  </div>
                ) : (
                  <p className="mt-2 text-[13px] text-ink leading-relaxed">
                    {p.spoiler && <span className="inline-flex items-center gap-1 text-[10px] text-spoiler font-semibold uppercase tracking-wide mr-1.5"><I name="alert-triangle" size={10} className="text-spoiler" />Spoiler</span>}
                    {p.text}
                  </p>
                )}

                {/* Actions */}
                <div className="flex items-center gap-5 mt-3">
                  <button onClick={() => setLiked(!liked)} className={`flex items-center gap-1 text-xs transition ${liked ? 'text-rose-500' : 'text-ink-muted hover:text-rose-400'}`}>
                    <I name="heart" size={14} fill={liked} /> {p.likes + (liked ? 1 : 0)}
                  </button>
                  <button className="flex items-center gap-1 text-xs text-ink-muted hover:text-sage-600 transition">
                    <I name="message-circle" size={14} /> {p.replies}
                  </button>
                  <button className="flex items-center gap-1 text-xs text-ink-muted hover:text-sage-600 transition ml-auto">
                    <I name="bookmark" size={14} />
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      /* ═══════ SCREEN: HOME ═══════ */
      const Home = () => (
        <div className="pb-20 relative">
          {/* Tabs */}
          <div className="flex border-b border-stone-200 bg-white">
            {['seguindo','explorar'].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`flex-1 py-3 text-sm font-semibold capitalize transition ${tab === t ? 'text-sage-700 border-b-2 border-sage-600' : 'text-ink-muted'}`}>
                {t}
              </button>
            ))}
          </div>
          <div className="p-4">
            {feedPosts.map(p => <PostCard key={p.id} p={p} />)}
          </div>
        </div>
      );

      /* ═══════ SCREEN: BUSCA ═══════ */
      const Busca = () => {
        const q = searchFilter.toLowerCase();
        const filtered = q.length === 0 ? books : books.filter(b =>
          b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || b.genre.toLowerCase().includes(q)
        );
        return (
          <div className="pb-20">
            <div className="p-4">
              <div className="flex items-center gap-2 bg-white rounded-xl px-4 py-3 border border-stone-200 mb-4">
                <I name="search" size={16} className="text-ink-muted" />
                <input
                  ref={searchRef}
                  defaultValue=""
                  onInput={e => setSearchFilter(e.target.value)}
                  placeholder="Título, autor ou gênero..."
                  className="flex-1 bg-transparent outline-none text-sm text-ink placeholder-ink-faint"
                />
                {searchFilter && <button onClick={() => { if(searchRef.current) searchRef.current.value = ''; setSearchFilter(''); }} className="text-ink-faint hover:text-ink-muted text-lg leading-none">&times;</button>}
              </div>
              <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-3">{q ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}` : 'Em Alta'}</p>
              {filtered.length === 0 && (
                <div className="text-center py-12">
                  <I name="search" size={32} className="mx-auto mb-3 text-ink-faint" />
                  <p className="text-sm text-ink-muted">Nenhum livro encontrado</p>
                  <p className="text-xs text-ink-faint mt-1">Tente outro título, autor ou gênero</p>
                </div>
              )}
              {filtered.map(b => (
                <div key={b.id} className="bg-white rounded-xl p-4 mb-3 flex gap-4">
                  <img src={b.cover} alt={b.title} className="w-20 h-28 rounded-lg object-cover shadow-sm flex-shrink-0" />
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-sm text-ink">{b.title}</p>
                    <p className="text-xs text-ink-light mt-0.5">{b.author}</p>
                    <div className="flex items-center gap-1 mt-1.5">
                      {Array.from({length:5}).map((_,i) => <span key={i} className={`text-xs ${i < Math.floor(b.rating) ? 'text-amber-400' : 'text-stone-300'}`}>★</span>)}
                      <span className="text-[10px] text-ink-muted ml-1">{b.rating}</span>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1.5">
                      <I name="users" size={12} className="text-ink-muted" />
                      <span className="text-[11px] text-ink-muted">{b.readers} lendo agora</span>
                    </div>
                    <div className="flex items-center gap-1.5 mt-1">
                      <I name="tag" size={12} className="text-ink-muted" />
                      <span className="text-[11px] text-ink-muted">{b.genre}</span>
                    </div>
                    <button onClick={() => go('forum', b)} className="mt-3 w-full bg-sage-600 text-white text-xs font-semibold py-2 rounded-lg hover:bg-sage-700 transition">
                      Ver Fórum do Livro
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      /* ═══════ SCREEN: FÓRUM ═══════ */
      const Forum = () => {
        const b = postBook || books[0];
        const locked = (ch) => ch > userChapter;
        const chapNums = [];
        for (let i=1; i<=b.chapters; i++) {
          if (i<=3 || i>=b.chapters-1 || (typeof chapter === 'number' && (i===chapter || Math.abs(i-chapter)<=1))) chapNums.push(i);
          else if (chapNums[chapNums.length-1]!=='...') chapNums.push('...');
        }

        const chPosts = chapter === 'todos'
          ? forumPosts
          : chapter === 'geral'
            ? forumPosts.filter(p => p.chapter === 'geral')
            : forumPosts.filter(p => p.chapter === chapter);

        const teaserLabel = chapter === 'todos'
          ? 'este livro'
          : chapter === 'geral'
            ? 'discussões gerais'
            : `Capítulo ${chapter}`;

        const btnLabel = chapter === 'todos' || chapter === 'geral'
          ? 'Compartilhar sobre este livro'
          : `Compartilhar sobre o Cap. ${chapter}`;

        const tabBtn = (id, label) => (
          <button key={id} onClick={() => setChapter(id)}
            className={`px-3 h-9 rounded-lg text-xs font-semibold flex items-center justify-center transition flex-shrink-0 ${
              chapter === id ? 'bg-sage-600 text-white shadow-sm' : 'bg-white text-ink-light border border-stone-200 hover:border-sage-300'
            }`}>
            {label}
          </button>
        );

        return (
          <div className="min-h-screen flex flex-col pb-20">
            {/* Header */}
            <div className="flex items-center gap-3 px-4 py-3 bg-white border-b border-stone-200 sticky top-0 z-40">
              <button onClick={goBack} className="text-ink-light"><I name="arrow-left" size={20} /></button>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-sm text-ink truncate">{b.title}</p>
                <p className="text-[11px] text-ink-muted">{b.author}</p>
              </div>
              <img src={b.cover} className="w-8 h-11 rounded object-cover shadow-sm" />
            </div>

            {/* Progress bar */}
            <div className="bg-white px-4 py-3 border-b border-stone-200">
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-[11px] text-ink-light font-medium">Seu progresso</span>
                <span className="text-[11px] text-sage-600 font-semibold">Cap. {userChapter} de {b.chapters}</span>
              </div>
              <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                <div className="h-full bg-sage-500 rounded-full transition-all" style={{ width: `${(userChapter / b.chapters) * 100}%` }} />
              </div>
              <p className="text-[10px] text-ink-faint mt-1.5">Leia no seu ritmo. O Verso protege sua experiência.</p>
            </div>

            {/* Tab selector: Todos | Geral | chapters */}
            <div className="bg-white px-4 pt-3 pb-3 border-b border-stone-200">
              <p className="text-[11px] font-semibold text-ink-light mb-2 uppercase tracking-wider">Filtrar por</p>
              <div className="flex gap-1.5 items-center overflow-x-auto no-scrollbar">
                {tabBtn('todos', 'Todos')}
                {tabBtn('geral', 'Geral')}
                <div className="w-px h-6 bg-stone-200 mx-1 flex-shrink-0" />
                {chapNums.map((ch, idx) =>
                  ch === '...' ? <span key={`d${idx}`} className="text-ink-faint text-xs px-1">...</span> : (
                    <button key={ch} onClick={() => !locked(ch) && setChapter(ch)}
                      className={`w-9 h-9 rounded-lg text-xs font-semibold flex items-center justify-center transition flex-shrink-0 relative ${
                        locked(ch) ? 'bg-stone-100 text-ink-faint cursor-not-allowed' :
                        chapter === ch ? 'bg-sage-600 text-white shadow-sm' : 'bg-white text-ink-light border border-stone-200 hover:border-sage-300'
                      }`}>
                      {locked(ch) ? <I name="lock" size={12} className="text-ink-faint" /> : ch}
                      {!locked(ch) && ch !== chapter && <span className="absolute -top-1 -right-1 w-2 h-2 bg-sage-400 rounded-full" />}
                    </button>
                  )
                )}
              </div>
            </div>

            {/* Activity teaser + Share button */}
            <div className="px-4 py-2.5 bg-warm-100 flex items-center gap-2">
              <I name="message-circle" size={14} className="text-sage-500" />
              <span className="text-[11px] text-ink-light flex-1">{chPosts.length * 15} pessoas reagiram em {teaserLabel}</span>
              <button onClick={() => { setPostBook(b); go('post'); }}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-sage-600 text-white text-[11px] font-semibold rounded-full hover:bg-sage-700 transition">
                <I name="plus" size={13} /> Compartilhar
              </button>
            </div>

            {/* Posts */}
            <div className="p-4 flex-1">
              {chPosts.length > 0 ? chPosts.map(p => <PostCard key={p.id} p={{...p, book: b}} showBookCtx={false} />) : (
                <div className="text-center py-12 text-ink-muted">
                  <I name="message-circle" size={32} className="mx-auto mb-3 text-ink-faint" />
                  <p className="text-sm font-medium">Nenhum post aqui ainda</p>
                  <p className="text-xs mt-1">Seja o primeiro a compartilhar!</p>
                </div>
              )}
            </div>
          </div>
        );
      };

      /* ═══════ SCREEN: NOVO VERSO ═══════ */
      const NovoVerso = () => {
        const b = postBook;
        return (
          <div className="min-h-screen flex flex-col pb-20">
            <div className="flex items-center justify-between px-4 py-3 bg-white border-b border-stone-200 sticky top-0 z-40">
              <button onClick={goBack} className="text-ink-light"><I name="arrow-left" size={20} /></button>
              <p className="font-semibold text-sm text-ink">Novo Verso</p>
              <button onClick={publishPost}
                className={`text-sm font-semibold px-4 py-1.5 rounded-full transition ${postTextLen > 0 ? 'bg-sage-600 text-white' : 'bg-stone-100 text-ink-faint cursor-not-allowed'}`}
                disabled={!postTextLen}>Publicar</button>
            </div>

            <div className="p-4 space-y-5 flex-1">
              {/* Book context — only when posting about a specific book */}
              {b && (
                <div className="flex items-center gap-3 bg-sage-50 rounded-xl p-3 border border-sage-100">
                  <img src={b.cover} className="w-10 h-14 rounded object-cover shadow-sm" />
                  <div className="flex-1">
                    <p className="text-[10px] text-ink-muted uppercase tracking-wider font-medium">Livro</p>
                    <p className="font-semibold text-sm text-ink">{b.title}</p>
                    <p className="text-[11px] text-ink-light">{b.author}</p>
                  </div>
                  <I name="chevron-right" size={16} className="text-ink-faint" />
                </div>
              )}

              {/* Chapter selector — only when posting about a specific book */}
              {b && (
                <div>
                  <p className="text-xs font-semibold text-ink-light mb-2">Checkpoint</p>
                  <div className="relative">
                    <select value={postChapter} onChange={e => setPostChapter(e.target.value)}
                      className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-ink outline-none appearance-none">
                      <option value="geral">Geral (sem capítulo específico)</option>
                      {Array.from({length:b.chapters}).map((_,i) => (
                        <option key={i+1} value={i+1}>Capítulo {i+1}</option>
                      ))}
                    </select>
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-ink-muted">
                      <I name="chevron-down" size={16} />
                    </div>
                  </div>
                </div>
              )}

              {/* Textarea */}
              <div>
                <textarea ref={postRef} defaultValue=""
                  onInput={e => { if(e.target.value.length > MAX) e.target.value = e.target.value.slice(0, MAX); setPostTextLen(e.target.value.length); }}
                  placeholder={b ? 'O que você está pensando sobre este capítulo?' : 'O que está na sua mente?'}
                  className="w-full bg-white border border-stone-200 rounded-xl px-4 py-4 text-sm text-ink placeholder-ink-faint outline-none resize-none leading-relaxed"
                  rows="6" />
                <p className="text-[10px] text-ink-faint text-right mt-1">{(MAX - postTextLen).toLocaleString('pt-BR')} caracteres restantes</p>
              </div>

              {/* Spoiler toggle */}
              <div className="flex items-center justify-between bg-white border border-stone-200 rounded-xl px-4 py-3">
                <div className="flex items-center gap-2.5">
                  <I name="eye-off" size={16} className={spoiler ? 'text-spoiler' : 'text-ink-muted'} />
                  <div>
                    <p className="text-sm font-medium text-ink">Contém Spoiler</p>
                    <p className="text-[10px] text-ink-muted">Proteja quem ainda não chegou aqui</p>
                  </div>
                </div>
                <button onClick={() => setSpoiler(!spoiler)}
                  className={`w-12 h-7 rounded-full transition relative ${spoiler ? 'bg-spoiler' : 'bg-stone-200'}`}>
                  <div className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-all ${spoiler ? 'left-[22px]' : 'left-0.5'}`} />
                </button>
              </div>
            </div>
          </div>
        );
      };

      /* ═══════ SCREEN: ESTANTE ═══════ */
      const Estante = () => (
        <div className="pb-20">
          <div className="p-4">
            <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-3">Lendo Agora</p>
            {books.slice(0,1).map(b => (
              <div key={b.id} onClick={() => go('forum', b)} className="bg-white rounded-xl p-4 mb-3 flex gap-4 cursor-pointer hover:shadow-sm transition">
                <img src={b.cover} className="w-16 h-24 rounded-lg object-cover shadow-sm" />
                <div className="flex-1">
                  <p className="font-semibold text-sm text-ink">{b.title}</p>
                  <p className="text-xs text-ink-light">{b.author}</p>
                  <div className="mt-2">
                    <div className="flex justify-between text-[10px] text-ink-muted mb-1"><span>Progresso</span><span>Cap. {userChapter}/{b.chapters}</span></div>
                    <div className="h-1.5 bg-stone-100 rounded-full"><div className="h-full bg-sage-500 rounded-full" style={{width:`${(userChapter/b.chapters)*100}%`}} /></div>
                  </div>
                </div>
              </div>
            ))}
            <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-3 mt-5">Lista de Desejos</p>
            <div className="grid grid-cols-3 gap-3">
              {books.map(b => (
                <div key={b.id} className="bg-white rounded-lg p-2 cursor-pointer" onClick={() => go('forum', b)}>
                  <img src={b.cover} className="w-full aspect-[2/3] rounded object-cover" />
                  <p className="text-[10px] font-semibold text-ink mt-1.5 line-clamp-3">{b.title}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      /* ═══════ SCREEN: PERFIL ═══════ */
      const Perfil = () => (
        <div className="pb-20">
          <div className="p-4">
            {/* Profile header */}
            <div className="bg-white rounded-xl p-5 text-center">
              <Av name="Rayssa" size={64} />
              <p className="font-semibold text-ink mt-3">Rayssa</p>
              <p className="text-xs text-ink-muted">@rayssa.reads</p>
              <div className="flex justify-center gap-8 mt-4">
                <div className="text-center"><p className="font-bold text-ink">247</p><p className="text-[10px] text-ink-muted">Seguidores</p></div>
                <div className="text-center"><p className="font-bold text-ink">35</p><p className="text-[10px] text-ink-muted">Livros Lidos</p></div>
                <div className="text-center"><p className="font-bold text-ink">182</p><p className="text-[10px] text-ink-muted">Posts</p></div>
              </div>
            </div>

            {/* Badges */}
            <div className="mt-4">
              <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-2">Badges</p>
              <div className="flex gap-2 overflow-x-auto no-scrollbar">
                {badges.map((bg, i) => (
                  <div key={i} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-semibold flex-shrink-0 ${bg.color}`}>
                    <I name={bg.icon} size={13} /> {bg.label}
                  </div>
                ))}
              </div>
            </div>

            {/* Currently Reading */}
            <div className="mt-4 bg-white rounded-xl p-4">
              <div className="flex items-center justify-between mb-3">
                <p className="text-xs font-semibold text-ink-light uppercase tracking-wider">Lendo Agora</p>
                <p className="text-[10px] text-ink-faint">{books.slice(0,5).length} livros</p>
              </div>
              <div className="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                {books.slice(0,5).map((bk, i) => {
                  const progress = [68, 42, 15, 91, 30][i] || 50;
                  return (
                    <div key={bk.id} className="flex-shrink-0 w-28">
                      <img src={bk.cover} className="w-28 h-40 rounded-lg object-cover shadow-sm mb-2" />
                      <p className="text-[11px] font-semibold text-ink truncate">{bk.title}</p>
                      <p className="text-[10px] text-ink-muted truncate">{bk.author}</p>
                      <div className="mt-1.5 h-1.5 bg-stone-100 rounded-full overflow-hidden">
                        <div className="h-full bg-sage-500 rounded-full" style={{ width: `${progress}%` }} />
                      </div>
                      <p className="text-[9px] text-ink-faint mt-0.5">{progress}% lido</p>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Genre chart */}
            <div className="mt-4 bg-white rounded-xl p-4">
              <p className="text-xs font-semibold text-ink-light uppercase tracking-wider mb-3">Gêneros Lidos</p>
              {[
                { genre: 'Romance', pct: 40, color: 'bg-sage-500' },
                { genre: 'Ficção', pct: 25, color: 'bg-sage-300' },
                { genre: 'Suspense', pct: 20, color: 'bg-amber-400' },
                { genre: 'Fantasia', pct: 15, color: 'bg-purple-400' },
              ].map(g => (
                <div key={g.genre} className="mb-2.5">
                  <div className="flex justify-between text-xs mb-1"><span className="text-ink-light">{g.genre}</span><span className="text-ink-muted">{g.pct}%</span></div>
                  <div className="h-2 bg-stone-100 rounded-full"><div className={`h-full ${g.color} rounded-full`} style={{ width: `${g.pct}%` }} /></div>
                </div>
              ))}
            </div>

            {/* My Posts */}
            <div className="mt-4 bg-white rounded-xl p-4">
              <p className="text-xs font-semibold text-ink-light uppercase tracking-wider mb-3">Meus Versos</p>
              <div className="space-y-3">
                {[...feedPosts.filter(p => p.user.name === 'Ana Beatriz'), ...forumPosts.filter(p => p.user.name === 'Ana Beatriz')].map(p => (
                  <div key={p.id} className="border border-stone-100 rounded-xl p-3">
                    <div className="flex items-center gap-2 mb-2">
                      <Av name={p.user.name} size={24} />
                      <div className="flex-1 min-w-0">
                        <p className="text-[11px] font-semibold text-ink truncate">{p.user.name}</p>
                        <p className="text-[10px] text-ink-faint">{p.time} atrás {p.book ? `· ${p.book.title}` : ''} · {typeof p.chapter === 'number' ? `Cap. ${p.chapter}` : 'Geral'}</p>
                      </div>
                      {p.spoiler && <span className="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-semibold">Spoiler</span>}
                    </div>
                    <p className="text-sm text-ink leading-relaxed">{p.text}</p>
                    <div className="flex items-center gap-4 mt-2 pt-2 border-t border-stone-100">
                      <span className="text-[11px] text-ink-muted flex items-center gap-1"><I name="heart" size={12} /> {p.likes}</span>
                      <span className="text-[11px] text-ink-muted flex items-center gap-1"><I name="message-circle" size={12} /> {p.replies}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      /* ═══════ SCREEN: USER PROFILE ═══════ */
      const UserProfile = () => {
        const u = viewUser;
        if (!u) return null;
        const userPosts = [...feedPosts.filter(p => p.user.name === u.name), ...forumPosts.filter(p => p.user.name === u.name)];
        const readingBooks = books.slice(0, 3).map((bk, i) => ({ ...bk, progress: [72, 35, 58][i] || 50 }));
        const userBadges = [
          badges[Math.floor(Math.random() * badges.length)],
          badges[Math.floor(Math.random() * badges.length)],
        ];
        return (
          <div className="min-h-screen pb-20">
            <div className="flex items-center gap-3 px-4 py-3 bg-white border-b border-stone-200 sticky top-0 z-40">
              <button onClick={goBack} className="text-ink-light"><I name="arrow-left" size={20} /></button>
              <p className="font-semibold text-sm text-ink">Perfil</p>
            </div>

            <div className="p-4">
              {/* Profile header */}
              <div className="bg-white rounded-xl p-5 text-center">
                <Av name={u.name} size={72} />
                <h2 className="font-display text-xl text-ink mt-3">{u.name}</h2>
                <p className="text-xs text-ink-muted">{u.handle}</p>
                <p className="text-sm text-ink-light mt-2 max-w-xs mx-auto">{u.bio}</p>
                <p className="text-[10px] text-ink-faint mt-1">Membro desde {u.joined}</p>

                <div className="flex justify-center gap-8 mt-4 pt-4 border-t border-stone-100">
                  <div><p className="text-lg font-bold text-ink">{u.booksRead}</p><p className="text-[10px] text-ink-muted">Livros</p></div>
                  <div><p className="text-lg font-bold text-ink">{u.followers.toLocaleString('pt-BR')}</p><p className="text-[10px] text-ink-muted">Seguidores</p></div>
                  <div><p className="text-lg font-bold text-ink">{u.following}</p><p className="text-[10px] text-ink-muted">Seguindo</p></div>
                </div>

                <button className="mt-4 px-6 py-2 bg-sage-600 text-white text-sm font-semibold rounded-full hover:bg-sage-700 transition">
                  Seguir
                </button>
              </div>

              {/* Badges */}
              <div className="mt-4 bg-white rounded-xl p-4">
                <p className="text-xs font-semibold text-ink-muted uppercase tracking-wider mb-2">Badges</p>
                <div className="flex gap-2 flex-wrap">
                  {userBadges.map((bg, i) => (
                    <div key={i} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-semibold ${bg.color}`}>
                      <I name={bg.icon} size={13} /> {bg.label}
                    </div>
                  ))}
                </div>
              </div>

              {/* Reading now */}
              <div className="mt-4 bg-white rounded-xl p-4">
                <p className="text-xs font-semibold text-ink-light uppercase tracking-wider mb-3">Lendo Agora</p>
                <div className="flex gap-3 overflow-x-auto no-scrollbar pb-1">
                  {readingBooks.map(bk => (
                    <div key={bk.id} className="flex-shrink-0 w-24">
                      <img src={bk.cover} className="w-24 h-34 rounded-lg object-cover shadow-sm mb-2" />
                      <p className="text-[10px] font-semibold text-ink truncate">{bk.title}</p>
                      <div className="mt-1 h-1.5 bg-stone-100 rounded-full overflow-hidden">
                        <div className="h-full bg-sage-500 rounded-full" style={{ width: `${bk.progress}%` }} />
                      </div>
                      <p className="text-[9px] text-ink-faint mt-0.5">{bk.progress}%</p>
                    </div>
                  ))}
                </div>
              </div>

              {/* User posts */}
              <div className="mt-4 bg-white rounded-xl p-4">
                <p className="text-xs font-semibold text-ink-light uppercase tracking-wider mb-3">Versos de {u.name.split(' ')[0]}</p>
                {userPosts.length > 0 ? (
                  <div className="space-y-3">
                    {userPosts.map(p => (
                      <div key={p.id} className="border border-stone-100 rounded-xl p-3">
                        <div className="flex items-center gap-2 mb-2">
                          <Av name={p.user.name} size={24} />
                          <div className="flex-1 min-w-0">
                            <p className="text-[11px] font-semibold text-ink truncate">{p.user.name}</p>
                            <p className="text-[10px] text-ink-faint">{p.time} atrás {p.book ? `· ${p.book.title}` : ''} · {typeof p.chapter === 'number' ? `Cap. ${p.chapter}` : 'Geral'}</p>
                          </div>
                          {p.spoiler && <span className="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-semibold">Spoiler</span>}
                        </div>
                        <p className="text-sm text-ink leading-relaxed">{p.text}</p>
                        <div className="flex items-center gap-4 mt-2 pt-2 border-t border-stone-100">
                          <span className="text-[11px] text-ink-muted flex items-center gap-1"><I name="heart" size={12} /> {p.likes}</span>
                          <span className="text-[11px] text-ink-muted flex items-center gap-1"><I name="message-circle" size={12} /> {p.replies}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-8">
                    <I name="message-circle" size={28} className="mx-auto mb-2 text-ink-faint" />
                    <p className="text-sm text-ink-muted">Nenhum verso ainda</p>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      /* ═══════ BOTTOM NAV ═══════ */
      const Nav = () => (
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-white border-t border-stone-200 flex justify-around py-2 z-50">
          {[
            { id:'home', icon:'home', label:'Home' },
            { id:'busca', icon:'search', label:'Busca' },
            { id:'estante', icon:'book-open', label:'Estante' },
            { id:'perfil', icon:'user', label:'Perfil' },
          ].map(t => (
            <button key={t.id} onClick={() => go(t.id)}
              className={`flex flex-col items-center gap-0.5 px-3 ${screen === t.id ? 'text-sage-600' : 'text-ink-faint'}`}>
              <I name={t.icon} size={20} />
              <span className="text-[9px] font-medium">{t.label}</span>
            </button>
          ))}
        </nav>
      );

      const mainScreens = ['home','busca','estante','perfil'];
      const showNav = true;

      /* ═══════ LAYOUT ═══════ */
      return (
        <div className="max-w-md mx-auto bg-canvas min-h-screen shadow-2xl relative">
          {/* Header — only on main tab screens */}
          {mainScreens.includes(screen) && (
            <div className="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-stone-200 px-4 py-3 flex items-center gap-3 z-50">
              {screen !== 'home' && (
                <button onClick={goBack} className="text-ink p-1 -ml-1 hover:text-sage-700 transition"><I name="arrow-left" size={22} /></button>
              )}
              <h1 className="text-xl font-display italic text-sage-800 flex-1">Verso</h1>
              <div className="flex items-center gap-3">
                <button className="text-ink-muted"><I name="bell" size={18} /></button>
                <Av name="R" size={28} />
              </div>
            </div>
          )}

          {screen === 'home' && <Home />}
          {screen === 'busca' && <Busca />}
          {screen === 'forum' && <Forum />}
          {screen === 'post' && <NovoVerso />}
          {screen === 'estante' && <Estante />}
          {screen === 'perfil' && <Perfil />}
          {screen === 'userprofile' && <UserProfile />}

          {/* FAB — new post (home only) */}
          {screen === 'home' && (
            <div className="sticky bottom-20 z-50 flex justify-end px-4 pointer-events-none" style={{ marginTop: '-70px' }}>
              <button onClick={() => { setPostBook(null); go('post'); }}
                className="w-14 h-14 bg-sage-600 text-white rounded-full shadow-lg hover:bg-sage-700 transition flex items-center justify-center pointer-events-auto">
                <I name="plus" size={24} />
              </button>
            </div>
          )}

          {showNav && <Nav />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
